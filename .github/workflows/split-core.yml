name: Split Core

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install splitsh-lite
        run: |
          curl -L https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz | tar -xz
          sudo mv splitsh-lite /usr/local/bin/

      - name: Split src/ and push to tetherphp-core
        env:
          SPLIT_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        run: |
          SHA=$(splitsh-lite --prefix=src/)
          git remote add core https://x-access-token:${SPLIT_TOKEN}@github.com/DillonSmart/tetherphp-core.git 2>/dev/null || git remote set-url core https://x-access-token:${SPLIT_TOKEN}@github.com/DillonSmart/tetherphp-core.git
          git push core "$SHA:refs/heads/main" --force

      - name: Push tag to core (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPLIT_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          SHA=$(splitsh-lite --prefix=src/)
          git push core "$SHA:refs/tags/$TAG" --force
